name: weekly-eval

# Wave 60.94.n — Weekly eval gate per [[80 - Master Plan V1]] P4.5 quality target.
# Runs eval framework against production. If avg score < 9.0, alert via Sentry.

on:
  schedule:
    # Mon 00:00 UTC = Mon 07:00 ICT
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      persona_filter:
        description: 'Persona filter (e.g. anh_khoa). Empty = all.'
        required: false
        default: ''
      judge_mode:
        description: 'rubric-only | rubric-plus-llm | llm-only'
        required: false
        default: 'rubric-plus-llm'

permissions:
  contents: read
  issues: write # to file alert issue on regression

concurrency:
  group: weekly-eval
  cancel-in-progress: false

jobs:
  eval:
    name: Eval run + alert on regression
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ADMIN_TOKEN: ${{ secrets.HIEU_API_ADMIN_TOKEN }}
      EVAL_API_URL: https://api.hieu.asia
      # Public Supabase anon JWT (same value as NEXT_PUBLIC_SUPABASE_ANON_KEY) —
      # required so reading-create/reading-get pass the Edge Function verify_jwt gate.
      EVAL_SUPABASE_ANON_KEY: ${{ secrets.EVAL_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # action-setup@v4 with NO version key — defers to packageManager
      # (pnpm@9.12.0) in root package.json, matching ci.yml. v5 + an explicit
      # `version: 10` hard-errors ERR_PNPM_BAD_PM_VERSION (dual-spec conflict).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile --filter web

      # Fail fast & CLEARLY if the eval can't authenticate — otherwise the runner
      # exits 1 at its token check and the regression alert below mislabels a
      # missing-secret CONFIG failure as a quality regression (see #194/#240).
      - name: Verify eval secrets present
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::CONFIG: HIEU_API_ADMIN_TOKEN secret is missing/empty — the eval cannot run. Add it in Settings → Secrets and variables → Actions. This is NOT a quality regression."
            exit 1
          fi
          if [ -z "$EVAL_SUPABASE_ANON_KEY" ]; then
            echo "::error::CONFIG: EVAL_SUPABASE_ANON_KEY secret is missing/empty — needed to authenticate to the reading service (value = the public NEXT_PUBLIC_SUPABASE_ANON_KEY). This is NOT a quality regression."
            exit 1
          fi

      - name: Run eval
        id: run
        run: |
          cd apps/web
          PERSONA_ARG=""
          if [ -n "${{ inputs.persona_filter }}" ]; then
            PERSONA_ARG="--persona ${{ inputs.persona_filter }}"
          fi
          JUDGE_ARG="--judge-mode ${{ inputs.judge_mode || 'rubric-plus-llm' }}"
          pnpm dlx tsx tests/eval/runner.ts $PERSONA_ARG $JUDGE_ARG
        continue-on-error: true

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: eval-results-${{ github.run_id }}
          path: apps/web/tests/eval/results/
          retention-days: 90

      - name: Alert on regression
        if: steps.run.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly eval gate failed — ${new Date().toISOString().slice(0, 10)}`,
              body: `The eval step exited non-zero.\n\n⚠️ FIRST open the "Run eval" step log:\n- If it printed \`Avg: X/10\` with X < 9.0 → genuine quality regression: download the eval-results artifact, review per-sample failures (prompt / Iztro tool / model).\n- If there is NO \`Avg:\` line (e.g. \`ADMIN_TOKEN required\`, API/network error) → INFRA/CONFIG failure, NOT a quality regression.\n\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nCC @nguyenhieuisocial`,
              labels: ['eval', 'quality-gate', 'p1'],
            });
