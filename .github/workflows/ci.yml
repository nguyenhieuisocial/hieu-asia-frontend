# Lint + test + build affected packages for the pnpm/turbo monorepo.
# Secrets required: none.
#
# Wave 60.25 — quota trim. Free-plan private-repo Actions quota is 2,000
# min/month and this workflow runs full pnpm install (~60s) + turbo
# lint/test/build (~90s) per commit. Two efficiency gates:
#   1. `paths-ignore` skips runs on pure-docs commits (README/markdown/
#      vault sync) and workflow-only edits since they can't change code
#      behaviour. Saves ~150s × every docs commit.
#   2. `concurrency` cancels in-flight runs when a newer commit lands on
#      the same ref, so rapid pushes don't queue redundant builds.
name: ci

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  # Wave 60.28b — manual trigger so we can test workflow once billing
  # quota refills (currently runs fail at runner allocation: "Job is
  # waiting for a hosted runner to come online" → 2s timeout with no
  # steps executed = hosted-runner provisioning blocked by exhausted
  # Free-plan minutes on private repo).
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: turbo lint + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history for `--filter='[origin/main]'` affected detection
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # pnpm version pinned via `packageManager` in package.json (pnpm@9.12.0).

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Turbo lint/test/build (affected)
        # Exclude `@hieu-asia/miniapp-zalo` — `zmp build` requires `zmp login`
        # (Zalo developer portal auth) which CI cannot perform. Local devs
        # build it manually after `zmp login`.
        run: |
          FILTER='--filter=!@hieu-asia/miniapp-zalo'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo lint test build "$FILTER" --filter='[origin/main]'
          else
            pnpm turbo lint test build "$FILTER"
          fi
