# Lint + test + build affected packages for the pnpm/turbo monorepo.
# Secrets required: none.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: turbo lint + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history for `--filter='[origin/main]'` affected detection
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Turbo lint/test/build (affected)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm turbo lint test build --filter='[origin/main]'
          else
            pnpm turbo lint test build
          fi
