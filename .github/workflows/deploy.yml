# Deploy all three apps to Vercel production on push to main.
#
# PREFERRED PATH: Vercel GitHub App integration
# ---------------------------------------------
# For production, we recommend installing the **Vercel GitHub App** on the
# `hieu-asia-frontend` repo (https://vercel.com/docs/git/vercel-for-github).
# Once installed and each app is imported in Vercel:
#   - Vercel auto-deploys every push to main (production)
#   - Vercel auto-deploys every PR (preview, with auto comment)
#   - No CLI tokens, no GHA build minutes
#
# This workflow is kept as a FALLBACK for cases where:
#   - The GitHub App isn't available (e.g. enterprise org without approval)
#   - You need custom build steps not expressible in vercel.json
#   - You want a single source of truth in YAML
#
# To DISABLE this workflow when GitHub App is active:
#   - GitHub repo Settings -> Actions -> Workflows -> deploy -> Disable
#   - OR change `on:` trigger to `workflow_dispatch:` only
#
# Production domain mapping (configure in Vercel project settings):
#   hieu-asia-web     -> hieu.asia
#   hieu-asia-admin   -> admin.hieu.asia
#   hieu-asia-miniapp -> miniapp.hieu.asia
#
# Secrets required (per repo, only when using CLI path):
#   VERCEL_TOKEN
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID_WEB
#   VERCEL_PROJECT_ID_ADMIN
#   VERCEL_PROJECT_ID_MINIAPP
# Optional:
#   SLACK_WEBHOOK_URL / DISCORD_WEBHOOK_URL  for deploy notifications
name: deploy

# DISABLED 2026-05-22 (Wave 22): Vercel GitHub App integration is now the
# canonical path. Production deploys auto-fire on push to main via Vercel's
# native Git integration (confirmed working — Wave 21 commit 5fdf44f deployed
# READY without GHA involvement). This CLI fallback path was failing on every
# push because VERCEL_TOKEN expired (#133) and was sending failure emails
# despite Vercel native deploys succeeding.
#
# To re-enable temporarily for manual CLI deploy:
#   - Rotate VERCEL_TOKEN in repo secrets first
#   - Use the "Run workflow" button on the Actions tab (workflow_dispatch)
#
# DO NOT add `push:` trigger back unless Vercel GitHub App is disconnected.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Vercel prod - ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: web
            project_id_secret: VERCEL_PROJECT_ID_WEB
          - name: admin
            project_id_secret: VERCEL_PROJECT_ID_ADMIN
          - name: miniapp
            project_id_secret: VERCEL_PROJECT_ID_MINIAPP
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets[matrix.app.project_id_secret] }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        # pnpm version pinned via `packageManager` in package.json (pnpm@9.12.0).

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
        # No `cache: pnpm` — the remote-build deploy doesn't run `pnpm install`
        # locally, so caching pnpm store fires a post-step path validation
        # warning that marks the job as failure even when deploy succeeds.

      - name: Install Vercel CLI
        # Pin to the latest stable that supports the deploy endpoint we use.
        # 47.1.4 is too old (endpoint requires 47.2.2+); 54.3.0 is latest.
        run: npm install -g vercel@54.3.0

      - name: Deploy production (remote build)
        id: deploy
        # IMPORTANT: run from MONOREPO ROOT (not apps/<name>/) — each Vercel
        # project has `rootDirectory: apps/<name>` configured server-side, so
        # CLI must execute from one level up. Running from `apps/admin` causes
        # path doubling: `apps/admin/apps/admin` and a 404 error.
        run: |
          url=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "::notice::Deployed ${{ matrix.app.name }} to $url"

  notify:
    name: Notify deploy result
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ needs.deploy.result }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          EMOJI="white_check_mark"
          [ "$STATUS" != "success" ] && EMOJI="x"
          curl -fsS -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\":${EMOJI}: frontend deploy *${STATUS}* on ${REPO}@${SHA:0:7}\"}"

      - name: Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ needs.deploy.result }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          curl -fsS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "{\"content\":\"frontend deploy **${STATUS}** on ${REPO}@${SHA:0:7}\"}"
