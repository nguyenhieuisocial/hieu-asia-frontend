# UI anti-pattern guard (note 167 §C.6) — fails a PR only on NEW violations in the
# lines it adds, so it never trips on pre-existing code. Pure node + git (no install),
# so it is fast. All 6 patterns are live (1-5 UI anti-patterns + §D route-registry:
# a new public page must be listed in app/sitemap.ts or lib/site-registry.ts).
#
# Advisory: this is a SEPARATE check, not part of the required
# "turbo lint + test + build" job, so a false positive never blocks a merge until
# the founder chooses to add it to branch protection.
# To PROMOTE it to a required check (no code change needed):
#   GitHub → Settings → Branches → main → Require status checks to pass →
#   add "ui-guard (note 167 §C.6)".
name: ui-guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ui-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-guard:
    name: ui-guard (note 167 §C.6)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so the guard can diff the PR against its base branch.
          fetch-depth: 0
      - name: Guard changed UI files for new anti-patterns
        run: node apps/web/scripts/ui-guard.mjs "origin/${{ github.base_ref }}"
