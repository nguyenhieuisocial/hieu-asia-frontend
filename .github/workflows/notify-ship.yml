name: notify-ship
# On every merge to main, announce what shipped to the admin group's
# Tính năng topic (@ad_hieuasia_bot). Real-time "đã ship" feed.
on:
  push:
    branches: [main]
jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - name: Post shipped commit to Tính năng topic
        env:
          TOKEN: ${{ secrets.ADMIN_BOT_TOKEN }}
          MSG: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$TOKEN" ]; then echo "ADMIN_BOT_TOKEN secret missing — skip"; exit 0; fi
          TITLE=$(printf '%s' "$MSG" | head -1)
          TEXT=$(printf '🚀 Đã ship — %s\n%s\n— %s (%s)' "$REPO" "$TITLE" "$AUTHOR" "${SHA:0:7}")
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id=-1003982280451 \
            -d message_thread_id=2 \
            --data-urlencode text="$TEXT" >/dev/null || true
