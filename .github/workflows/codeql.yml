# Wave 60.42 — CodeQL static analysis (GitHub Pro includes free for public + private).
#
# Runs on:
# - Push to main (catch regressions immediately)
# - PRs targeting main (block merge if HIGH+ severity)
# - Weekly schedule (catch new advisories in indexed code paths)
#
# Languages: javascript-typescript covers all 4 workspaces (web/admin/miniapp-*).
# Default queries = security-extended (more rules than security-and-quality
# baseline; better for security-focused project handling Vietnamese PII).
#
# Quota: GitHub Pro = 50 min/mo for code scanning on private repos
# (free unlimited for public). Schedule + push + PR = ~5-10 runs/mo,
# easily fits.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'  # Mondays 09:17 UTC (~16:17 ICT)
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write   # Required to upload SARIF results
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze TS+JS
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          # Skip generated + lockfile dirs to speed up indexing
          # (config-file approach if more excludes needed later)

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
