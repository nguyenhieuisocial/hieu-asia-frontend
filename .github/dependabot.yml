# Wave 60.42 — GitHub Pro Dependabot (auto-PR for dependency updates).
#
# Strategy (trimmed to cut bot-triggered CI/build volume):
# - pnpm (npm ecosystem) — DIRECT deps only, minor + patch, monthly.
#   Everything not in a named group collapses into one "misc" PR/month.
#   Major bumps + indirect (transitive) deps deferred to manual review;
#   security fixes still land automatically via Dependabot security updates.
# - GitHub Actions — monthly (was weekly), grouped into a single PR.
# - Group related ecosystem deps to minimise PR/build count.
#
# Reviewers: nguyenhieuisocial (founder solo); auto-approve disabled —
# every Dependabot PR still needs human eyeballs before merge.

version: 2
updates:
  # === Root workspace + each app/package ===
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "tuesday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 3
    versioning-strategy: "increase-if-necessary"
    allow:
      - dependency-type: "direct"
    ignore:
      # Major bumps require manual review (per Wave 60.30 footnote pattern)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      next-react:
        patterns:
          - "next"
          - "next-*"
          - "react"
          - "react-*"
          - "@next/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "tailwindcss-*"
          - "@tailwindcss/*"
          - "postcss"
          - "postcss-*"
          - "autoprefixer"
      sentry:
        patterns:
          - "@sentry/*"
      langchain:
        patterns:
          - "@langchain/*"
          - "langchain"
      types:
        patterns:
          - "@types/*"
      # Catch-all: collapse every remaining direct dep into ONE PR/month
      misc:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "dependabot"

  # === GitHub Actions ===
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
